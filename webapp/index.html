<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Fusion Belt</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>

  <!-- Ambient background -->
  <div class="bg" aria-hidden="true"></div>

  <!-- Emergency banner -->
  <div id="emergency" class="emergency hidden" role="alert" aria-live="assertive">
    <div class="emergency__dot"></div>
    <div class="emergency__copy">
      <span class="emergency__title">Fall detected</span>
      <span class="emergency__sub">Emergency response engaged</span>
    </div>
    <button class="emergency__dismiss" type="button" aria-label="Dismiss">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
        <path d="M3 3l8 8M11 3l-8 8" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
      </svg>
    </button>
  </div>

  <!-- Top navigation -->
  <header class="nav">
    <div class="nav__brand">
      <div class="nav__logo">
        <span class="nav__logo-pulse"></span>
      </div>
      <span class="nav__name">Fusion Belt</span>
    </div>

    <nav class="nav__status" id="status">
      <span class="chip" data-key="serial">Serial</span>
      <span class="chip" data-key="yolo">Vision</span>
      <span class="chip" data-key="warmup">Warmup</span>
      <span class="chip" data-key="ollama">LLM</span>
    </nav>

    <div class="nav__conn" id="conn-state">
      <span class="conn-dot"></span>
      <span class="conn-label">Connecting</span>
    </div>
  </header>

  <!-- Main grid -->
  <main class="grid">

    <!-- Camera feed -->
    <section class="card card--feed" style="--delay: 0ms">
      <div class="card__head">
        <h2 class="card__title">Live feed</h2>
        <span class="card__meta" id="feed-meta">No detections</span>
      </div>
      <div class="feed">
        <img id="feed" src="/mjpeg" alt="camera feed" />
        <canvas id="overlay" width="320" height="320"></canvas>

        <!-- Subtle scan beam -->
        <div class="feed__scan" aria-hidden="true"></div>

        <!-- HUD overlays -->
        <div class="feed__hud feed__hud--top">
          <span class="feed__pill feed__pill--live">
            <span class="feed__live-dot"></span>
            Live
          </span>
          <span class="feed__pill" id="feed-fps">— fps</span>
        </div>

        <div class="feed__hud feed__hud--bottom">
          <span class="feed__model">YOLO v8n</span>
          <span class="feed__time" id="feed-time">--:--:--</span>
        </div>
      </div>
    </section>

    <!-- Haptic compass -->
    <section class="card card--haptic" style="--delay: 80ms">
      <div class="card__head">
        <h2 class="card__title">Haptic</h2>
        <span class="card__meta" id="haptic-meta">Idle</span>
      </div>
      <div class="compass-wrap">
        <div class="compass" id="compass">
          <div class="compass__ring"></div>
          <div class="compass__ring compass__ring--inner"></div>
          <div class="compass__pulse"></div>
          <div class="compass__hub"></div>
          <button class="hbtn" data-dir="F" type="button" aria-label="Forward">F</button>
          <button class="hbtn" data-dir="L" type="button" aria-label="Left">L</button>
          <button class="hbtn" data-dir="R" type="button" aria-label="Right">R</button>
          <button class="hbtn" data-dir="B" type="button" aria-label="Back">B</button>
        </div>
      </div>
    </section>

    <!-- Proximity (4 directions) -->
    <section class="card card--distance" style="--delay: 160ms">
      <div class="card__head">
        <h2 class="card__title">Proximity</h2>
        <span class="card__meta" id="dist-state">Standby</span>
      </div>

      <ul class="prox" id="prox">
        <li class="prox__row" data-dir="F">
          <span class="prox__arrow" aria-hidden="true">
            <svg viewBox="0 0 14 14" fill="none"><path d="M7 11V3M3.5 6.5L7 3l3.5 3.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </span>
          <span class="prox__label">Front</span>
          <div class="prox__bar"><div class="prox__fill"></div></div>
          <span class="prox__value">—</span>
        </li>
        <li class="prox__row" data-dir="R">
          <span class="prox__arrow" aria-hidden="true">
            <svg viewBox="0 0 14 14" fill="none"><path d="M3 7h8M7.5 3.5L11 7l-3.5 3.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </span>
          <span class="prox__label">Right</span>
          <div class="prox__bar"><div class="prox__fill"></div></div>
          <span class="prox__value">—</span>
        </li>
        <li class="prox__row" data-dir="L">
          <span class="prox__arrow" aria-hidden="true">
            <svg viewBox="0 0 14 14" fill="none"><path d="M11 7H3M6.5 3.5L3 7l3.5 3.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </span>
          <span class="prox__label">Left</span>
          <div class="prox__bar"><div class="prox__fill"></div></div>
          <span class="prox__value">—</span>
        </li>
        <li class="prox__row" data-dir="B">
          <span class="prox__arrow" aria-hidden="true">
            <svg viewBox="0 0 14 14" fill="none"><path d="M7 3v8M3.5 7.5L7 11l3.5-3.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </span>
          <span class="prox__label">Back</span>
          <div class="prox__bar"><div class="prox__fill"></div></div>
          <span class="prox__value">—</span>
        </li>
      </ul>
    </section>

    <!-- IMU trace -->
    <section class="card card--imu" style="--delay: 240ms">
      <div class="card__head">
        <h2 class="card__title">Inertial</h2>
        <span class="card__meta" id="imu-meta">—</span>
      </div>
      <div class="imu">
        <canvas id="imu-chart"></canvas>
      </div>
      <div class="imu__legend">
        <span class="legend" style="--c: #7a9e7e">x</span>
        <span class="legend" style="--c: #d4a574">y</span>
        <span class="legend" style="--c: #c8847a">z</span>
      </div>
    </section>

    <!-- Voice transcript -->
    <section class="card card--voice" style="--delay: 320ms">
      <div class="card__head">
        <h2 class="card__title">Voice</h2>
        <span class="card__meta">Push to talk</span>
      </div>
      <div class="transcript" id="transcript">
        <p class="transcript__empty">No transcript yet.</p>
      </div>
    </section>

  </main>

  <script src="/static/app.js"></script>
</body>
</html>
